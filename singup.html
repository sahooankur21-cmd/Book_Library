<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div>
        <h1>Welcome To Student's Asset !</h1>
        <p>"The only thing that you absolutely have to know, is the location of the library."</p>
        <h4>--Albert Einstein--  </h4>
    </div>
    <form action="#">
        <!-- registration section -->
         <label for="Full name">Full Name :</label>
         <input type="text" name="Name" id="Name" placeholder="Enter Your Full Name" required>
         <br><br>
         <label for="Email">Email :</label>
         <input type="email" name="email" id="email" placeholder="Enter Your Email" required>
         <br><br>
         <label for="Contact number">Contact Number :</label>
         <input type="number" name="number" id="number" placeholder="Enter Your Contact Number" required>
         <br><br>
         <label for="student/teacher">Student/Teacher :</label>
         <select name="student/teacher" id="student/teacher">
            <option value="select">Select</option>
            <option value="teacher"> Teacher</option>
            <option value="student"> Student</option>
            <option value="none"> None</option>
         </select>
         <br><br>
         <label for="username">Username :</label>
         <input type="text" name="username" id="username" placeholder="Create a Username" required>
         <br><br>
         <label for="password">Password :</label>
         <input type="password" name="password" id="password" placeholder="Create a Password" required>
         <br>
         <input type="checkbox">
         <label for="remember">Remember Me ?</label>
         <br><br><br>
         <button>SING IN</button>
    </form>
    <p>Already have an Account ? <a href="login.html">LOGIN</a></p>
    
</body>
</html>
